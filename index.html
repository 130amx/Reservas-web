<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de reservas Traphouse </title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111210;
    --surface: #1A1C1A;
    --surface2: #222420;
    --border: #2E302C;
    --text: #F0EDE7;
    --text-muted: #8A8C84;
    --text-faint: #4E5048;
    --accent: #6AAF82;
    --accent-light: #1A2E20;
    --accent-border: #2E5A3A;
    --mine: #9A88CC;
    --mine-light: #1E1A2E;
    --mine-border: #3E3060;
    --red: #CC7070;
    --red-light: #2E1A1A;
    --red-border: #5A3030;
  }
}

  body {
    font-family: Calibri, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 2rem 2rem 1.5rem;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  .brand-name {
    font-family: Calibri, Arial, sans-serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header-rule {
    border: none;
    border-top: 1px solid var(--border);
    margin-top: 1.5rem;
  }

  /* MAIN LAYOUT */
  main {
    flex: 1;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 2rem;
    align-items: start;
  }

  /* CALENDAR CARD */
  .cal-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .cal-month {
    font-family: Calibri, Arial, sans-serif;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .cal-year {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 6px;
    font-style: italic;
  }

  .nav-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    font-size: 16px;
  }

  .nav-btn:hover {
    background: var(--surface2);
    border-color: #C8C0B4;
    color: var(--text);
  }

  /* DAY LABELS */
  .days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0.75rem 1rem 0;
  }

  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 4px 0;
  }

  /* DAY GRID */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0.5rem 1rem 1.25rem;
    gap: 3px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-xs);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    color: var(--text);
    position: relative;
  }

  .day-cell:hover:not(.empty):not(.past) {
    background: var(--surface2);
    border-color: var(--border);
  }

  .day-cell.empty { cursor: default; }

  .day-cell.past {
    color: var(--text-faint);
    cursor: default;
  }

  .day-cell.today {
    background: var(--surface2);
    border-color: var(--border);
    font-weight: 500;
  }

  .day-cell.today::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  .day-cell.reserved {
    background: var(--accent-light);
    border-color: var(--accent-border);
    color: var(--accent);
    font-weight: 500;
  }

  .day-cell.mine {
    background: var(--mine-light);
    border-color: var(--mine-border);
    color: var(--mine);
    font-weight: 500;
  }

  .day-cell.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .day-cell.reserved.selected {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  .day-cell.mine.selected {
    background: var(--mine);
    border-color: var(--mine);
    color: #fff;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* INFO CARD */
  .info-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.5rem;
  }

  .info-card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.75rem;
  }

  .info-date {
    font-family: Calibri, Arial, sans-serif;
    font-size: 24px;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .info-date.empty-state {
    font-size: 16px;
    font-family: Calibri, Arial, sans-serif;
    color: var(--text-muted);
    font-weight: 300;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 99px;
    margin-bottom: 1.25rem;
  }

  .badge-available { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
  .badge-reserved { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
  .badge-mine { background: var(--mine-light); color: var(--mine); border: 1px solid var(--mine-border); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: Calibri, Arial, sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    text-align: center;
  }

  .btn-main {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-main:hover { background: #234832; }

  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
  }

  .btn-outline:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: var(--red-light);
    color: var(--red);
    border-color: var(--red-border);
  }

  .btn-danger:hover { background: #EDDADA; }

  .btn-purple {
    background: var(--mine-light);
    color: var(--mine);
    border-color: var(--mine-border);
  }

  .btn-purple:hover { background: #E0D8F0; }

  .btn + .btn { margin-top: 8px; }

  /* CONTACT MODAL */
  .contact-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .contact-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .contact-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-faint);
    font-size: 18px;
    line-height: 1;
    padding: 2px;
    transition: color 0.12s;
  }

  .close-btn:hover { color: var(--text); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-family: Calibri, Arial, sans-serif;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.12s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  .contact-body { padding: 1.25rem 1.5rem; }

  .field { margin-bottom: 12px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }

  .field input,
  .field textarea {
    width: 100%;
    padding: 9px 12px;
    font-size: 14px;
    font-family: Calibri, Arial, sans-serif;
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.12s;
    resize: none;
  }

  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: var(--text-faint);
  }

  .send-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: Calibri, Arial, sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .send-btn:hover { background: #234832; }

  .success-toast {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-light);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    border-radius: var(--radius-xs);
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    margin-top: 10px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1rem 0;
  }

  /* EMPTY STATE */
  .empty-hint {
    font-size: 13px;
    color: var(--text-faint);
    line-height: 1.6;
    margin-top: 0.5rem;
  }

  /* RESPONSIVE */
  @media (max-width: 680px) {
    header { padding: 1.25rem 1rem 1rem; }
    main {
      grid-template-columns: 1fr;
      padding: 0 1rem 3rem;
      gap: 1rem;
    }
    .days-grid { gap: 2px; }
    .day-cell { font-size: 13px; }
    .cal-nav { padding: 1rem 1rem; }
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: fadeIn 0.2s ease forwards; }

  /* ICON helpers */
  .icon { display: inline-block; line-height: 1; }

  /* LOCKSCREEN */
  #lockscreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 2rem;
  }
  #lockscreen.hidden { display: none; }
  .lock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .lock-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent-light); border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem; font-size: 22px;
  }
  .lock-title { font-family: Calibri, Arial, sans-serif; font-size: 22px; letter-spacing: -0.02em; color: var(--text); margin-bottom: 0.4rem; }
  .lock-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }
  .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 2rem; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--red); border-color: var(--red); }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .num-btn {
    aspect-ratio: 1; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 18px;
    font-family: Calibri, Arial, sans-serif; font-weight: 400; cursor: pointer;
    transition: all 0.1s; display: flex; align-items: center; justify-content: center;
  }
  .num-btn:hover { background: var(--border); }
  .num-btn:active { transform: scale(0.94); }
  .num-btn.del { font-size: 14px; color: var(--text-muted); }
  .num-btn.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .lock-error { font-size: 12px; color: var(--red); margin-top: 1.25rem; min-height: 18px; font-weight: 500; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>


<div id="lockscreen">
  <div class="lock-card" id="lock-card">
    <div class="lock-icon">&#128274;</div>
    <div class="lock-title">Acceso privado</div>
    <p class="lock-subtitle">Introduce el código de 4 dígitos para continuar</p>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="pinPress('0')">0</button>
      <button class="num-btn del" onclick="pinDel()">&#9003;</button>
    </div>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<script>
  const PIN = '2134';
  let pinInput = '';

  function pinPress(digit) {
    if (pinInput.length >= 4) return;
    pinInput += digit;
    updateDots();
    if (pinInput.length === 4) {
      setTimeout(checkPin, 150);
    }
  }

  function pinDel() {
    pinInput = pinInput.slice(0, -1);
    updateDots();
    document.getElementById('lock-error').textContent = '';
  }

  function updateDots(state) {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.className = 'pin-dot';
      if (state === 'error') dot.classList.add('error');
      else if (i < pinInput.length) dot.classList.add('filled');
    }
  }

  function checkPin() {
    if (pinInput === PIN) {
      document.getElementById('lockscreen').classList.add('hidden');
      try { sessionStorage.setItem('unlocked', '1'); } catch(e) {}
    } else {
      updateDots('error');
      document.getElementById('lock-error').textContent = 'Código incorrecto. Inténtalo de nuevo.';
      document.getElementById('lock-card').classList.add('shake');
      setTimeout(() => {
        document.getElementById('lock-card').classList.remove('shake');
        pinInput = '';
        updateDots();
      }, 500);
    }
  }

  // Si ya está desbloqueado en esta sesión, salta la pantalla
  try {
    if (sessionStorage.getItem('unlocked') === '1') {
      document.getElementById('lockscreen').classList.add('hidden');
    }
  } catch(e) {}

  // Teclado físico
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('lockscreen').classList.contains('hidden')) return;
    if (e.key >= '0' && e.key <= '9') pinPress(e.key);
    if (e.key === 'Backspace') pinDel();
  });
</script>

<script type="module">
// ─── FIREBASE IMPORTS (deben ir primero) ────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── FIREBASE CONFIG ────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAwSs9EUkHJrLOHEQasjd3vcRGPa5iDLd0",
  authDomain: "reservas-1c283.firebaseapp.com",
  projectId: "reservas-1c283",
  storageBucket: "reservas-1c283.firebasestorage.app",
  messagingSenderId: "14364617645",
  appId: "1:14364617645:web:f73649e17a86f3a0254f24"
};
// ────────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_GEN = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAY_LABELS = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
const DAY_FULL = ['lunes','martes','miércoles','jueves','viernes','sábado','domingo'];

const today = new Date(); today.setHours(0,0,0,0);
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let selectedKey = null;
let showContact = false;
let activeTab = 'email';
let successMsg = '';

// Reserved dates cargados desde Firestore
const reservedDates = {};

// Escucha en tiempo real la colección "reservas"
onSnapshot(collection(db, "reservas"), (snapshot) => {
  snapshot.docChanges().forEach(change => {
    if (change.type === "added" || change.type === "modified") {
      reservedDates[change.doc.id] = change.doc.data().tipo || 'other';
    }
    if (change.type === "removed") {
      delete reservedDates[change.doc.id];
    }
  });
  render();
});

// Storage helpers (localStorage para datos del usuario actual)
function store(k, v) { try { localStorage.setItem(k, v); } catch(e){} }
function load(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
function remove(k) { try { localStorage.removeItem(k); } catch(e){} }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayKey() { return dateKey(today); }
function getMyKey() { return load('myReservedDay'); }
function getLastReservedOn() { return load('lastReservedOn'); }
function canReserveToday() { return getLastReservedOn() !== todayKey(); }

function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDateLong(key) {
  const [y, m, d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const dow = DAY_FULL[(dt.getDay()+6)%7];
  return `${dow.charAt(0).toUpperCase()+dow.slice(1)}, ${d} de ${MONTHS_GEN[m-1]}`;
}

// RENDER CALENDAR
function render() {
  renderHeader();
  renderGrid();
  renderSidebar();
}

function renderHeader() {
  document.getElementById('cal-month').textContent = MONTHS[currentMonth];
  document.getElementById('cal-year').textContent = currentYear;
  document.getElementById('today-label').textContent =
    `Hoy, ${today.getDate()} de ${MONTHS_GEN[today.getMonth()]}`;

  const hdr = document.getElementById('days-header');
  hdr.innerHTML = '';
  DAY_LABELS.forEach(l => {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = l;
    hdr.appendChild(el);
  });
}

function renderGrid() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const offset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const myKey = getMyKey();

  // Empty cells
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(currentYear, currentMonth, d);
    cellDate.setHours(0,0,0,0);
    const key = dateKey(cellDate);
    const isPast = cellDate < today;
    const isToday = cellDate.getTime() === today.getTime();
    const isMine = myKey === key;
    const isReserved = reservedDates[key] && !isMine;
    const isSelected = selectedKey === key;

    let classes = ['day-cell'];
    if (isPast) classes.push('past');
    else if (isToday) classes.push('today');
    if (isMine) classes.push('mine');
    else if (isReserved) classes.push('reserved');
    if (isSelected) classes.push('selected');

    const el = document.createElement('div');
    el.className = classes.join(' ');
    el.textContent = d;
    if (!isPast) el.onclick = () => selectDay(key);
    grid.appendChild(el);
  }
}

function selectDay(key) {
  successMsg = '';
  if (selectedKey === key) {
    selectedKey = null;
    showContact = false;
  } else {
    selectedKey = key;
    showContact = false;
  }
  render();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');

  if (!selectedKey) {
    sb.innerHTML = `
      <div class="info-card animate-in">
        <div class="info-card-label">Selección</div>
        <div class="info-date empty-state">Elige un día en el calendario</div>
        <p class="empty-hint">Haz clic en cualquier día disponible para ver opciones de reserva.</p>
      </div>
      <div class="info-card animate-in" style="background:var(--surface2); border-color:var(--border)">
        <div class="info-card-label">Cómo funciona</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-top:4px;">
          <p style="margin-bottom:6px;">&#x25CB;&nbsp; Puedes reservar <strong>un día por día natural</strong>.</p>
          <p style="margin-bottom:6px;">&#x25CB;&nbsp; Los días en <span style="color:var(--accent);font-weight:500">verde</span> ya están reservados.</p>
          <p>&#x25CB;&nbsp; Si quieres un día ocupado, puedes reclamarlo por correo o SMS.</p>
        </div>
      </div>
    `;
    return;
  }

  const myKey = getMyKey();
  const isMine = myKey === selectedKey;
  const isReserved = !!reservedDates[selectedKey] && !isMine;
  const dateLabel = formatDateLong(selectedKey);

  let badge = '';
  let actions = '';

  if (isMine) {
    badge = `<span class="status-badge badge-mine"><span class="badge-dot"></span>Tu reserva</span>`;
    actions = `
      <button class="btn btn-outline" onclick="cancelReservation()">Cancelar mi reserva</button>
    `;
  } else if (isReserved) {
    badge = `<span class="status-badge badge-reserved"><span class="badge-dot"></span>Ocupado</span>`;
    actions = `
      <button class="btn btn-purple" onclick="toggleContact()">&#9993;&nbsp; Reclamar este día</button>
    `;
  } else {
    if (!canReserveToday()) {
      badge = `<span class="status-badge" style="background:#FFF8E6;color:#7A5C00;border:1px solid #E0CC80"><span class="badge-dot"></span>Límite diario alcanzado</span>`;
      actions = `<p style="font-size:13px;color:var(--text-muted);line-height:1.6;">Ya hiciste una reserva hoy. Podrás reservar otro día mañana.</p>`;
    } else {
      badge = `<span class="status-badge badge-available"><span class="badge-dot"></span>Disponible</span>`;
      actions = `
        <button class="btn btn-main" onclick="confirmReserve()">&#10003;&nbsp; Reservar este día</button>
      `;
    }
  }

  let contactHTML = '';
  if (showContact && isReserved) {
    const msgDefault = `Hola, me gustaría reservar el ${dateLabel.toLowerCase()}. ¿Podrías cederme ese día?`;
    const emailTab = activeTab === 'email' ? `
      <div class="field"><label>Tu correo</label><input type="email" id="from-email" placeholder="tuemail@ejemplo.com"></div>
      <div class="field"><label>Correo del titular</label><input type="email" id="to-email" placeholder="titular@ejemplo.com"></div>
      <div class="field"><label>Mensaje</label><textarea id="msg-email" rows="3">${msgDefault}</textarea></div>
      <button class="send-btn" onclick="sendEmail()">Abrir en correo &rarr;</button>
    ` : `
      <div class="field"><label>Tu número</label><input type="tel" id="from-phone" placeholder="+34 600 000 000"></div>
      <div class="field"><label>Número del titular</label><input type="tel" id="to-phone" placeholder="+34 600 000 000"></div>
      <div class="field"><label>Mensaje</label><textarea id="msg-sms" rows="3">${msgDefault}</textarea></div>
      <button class="send-btn" onclick="sendSMS()">Abrir en mensajes &rarr;</button>
    `;

    contactHTML = `
      <div class="contact-card animate-in">
        <div class="contact-header">
          <span class="contact-title">Reclamar día</span>
          <button class="close-btn" onclick="toggleContact()" aria-label="Cerrar">&times;</button>
        </div>
        <div class="tabs">
          <button class="tab ${activeTab==='email'?'active':''}" onclick="switchTab('email')">&#9993; Correo</button>
          <button class="tab ${activeTab==='sms'?'active':''}" onclick="switchTab('sms')">&#128241; SMS</button>
        </div>
        <div class="contact-body">
          ${emailTab}
          ${successMsg ? `<div class="success-toast" style="margin-top:12px">&#10003; ${successMsg}</div>` : ''}
        </div>
      </div>
    `;
  }

  if (successMsg && !showContact) {
    contactHTML = `<div class="success-toast animate-in">&#10003; ${successMsg}</div>`;
  }

  sb.innerHTML = `
    <div class="info-card animate-in">
      <div class="info-card-label">Día seleccionado</div>
      <div class="info-date">${dateLabel}</div>
      ${badge}
      <hr class="divider">
      ${actions}
    </div>
    ${contactHTML}
  `;
}

async function confirmReserve() {
  if (!selectedKey || !canReserveToday()) return;
  const myKey = getMyKey();
  // Si ya tenía otra reserva, la elimina de Firestore
  if (myKey && myKey !== selectedKey) {
    await deleteDoc(doc(db, "reservas", myKey));
  }
  // Guarda la nueva reserva en Firestore
  await setDoc(doc(db, "reservas", selectedKey), {
    tipo: 'other',
    fecha: selectedKey,
    creadoEn: new Date().toISOString()
  });
  store('myReservedDay', selectedKey);
  store('lastReservedOn', todayKey());
  successMsg = '';
  showContact = false;
  render();
}

async function cancelReservation() {
  const myKey = getMyKey();
  if (myKey) {
    await deleteDoc(doc(db, "reservas", myKey));
    remove('myReservedDay');
  }
  selectedKey = null;
  showContact = false;
  render();
}

function toggleContact() {
  showContact = !showContact;
  successMsg = '';
  render();
}

function switchTab(tab) {
  activeTab = tab;
  render();
}

function sendEmail() {
  const from = document.getElementById('from-email')?.value || '';
  const to = document.getElementById('to-email')?.value || '';
  const msg = document.getElementById('msg-email')?.value || '';
  if (!to) { alert('Introduce el correo del titular.'); return; }
  const subj = encodeURIComponent(`Solicitud de reserva · ${formatDateLong(selectedKey)}`);
  const body = encodeURIComponent(msg);
  window.location.href = `mailto:${to}?subject=${subj}&body=${body}`;
  successMsg = 'Abriendo tu cliente de correo…';
  showContact = false;
  render();
}

function sendSMS() {
  const to = document.getElementById('to-phone')?.value || '';
  const msg = document.getElementById('msg-sms')?.value || '';
  if (!to) { alert('Introduce el número del titular.'); return; }
  window.location.href = `sms:${to.replace(/\s/g,'')}?body=${encodeURIComponent(msg)}`;
  successMsg = 'Abriendo la app de mensajes…';
  showContact = false;
  render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  selectedKey = null;
  showContact = false;
  successMsg = '';
  render();
}

// ─── EXPONER FUNCIONES GLOBALMENTE (necesario con type="module") ─────────────
window.changeMonth = changeMonth;
window.selectDay = selectDay;
window.confirmReserve = confirmReserve;
window.cancelReservation = cancelReservation;
window.toggleContact = toggleContact;
window.switchTab = switchTab;
window.sendEmail = sendEmail;
window.sendSMS = sendSMS;

render();
</script>
</body>
</html>
